# Pindoc local dev stack.
#
# Default: Postgres 16 + pgvector + pindoc-server HTTP daemon. Embedding
# runs in-process via the bundled Gemma Q4 ONNX provider (2026-04-22
# Decision, Phase 17) so no embedding sidecar is required for day-to-day dev.
#
# Optional: Text Embeddings Inference (TEI) behind the `tei` profile.
# Opt in with `docker compose --profile tei up` when running with
# PINDOC_COMPOSE_EMBED_PROVIDER=http. The variable is intentionally
# compose-specific so a stray host PINDOC_EMBED_PROVIDER=stub cannot leak
# into the daemon container. The HuggingFace cache volume is kept across
# profile toggles so re-enabling doesn't re-download ~500MB of weights.
#
# PINDOC_DAEMON_PORT overrides the host port. This is useful while a legacy
# Windows NSSM service still owns 5830:
#
#   PINDOC_DAEMON_PORT=5832 docker compose up -d --build pindoc-server-daemon

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pindoc-db
    environment:
      POSTGRES_DB: pindoc
      POSTGRES_USER: pindoc
      POSTGRES_PASSWORD: pindoc_dev
      # Tune for a 2GB host: Pindoc is write-light; keep Postgres lean so the
      # embedding model has room. Override via PG_* env for real deployments.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - pindoc_db:/var/lib/postgresql/data
      # Migrations run from the Go binary (embedded) so no volume mount needed.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pindoc -d pindoc"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    # Conservative memory settings for a cheap cloud tier.
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=50
      - -c
      - work_mem=8MB

  pindoc-server-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    image: pindoc-server:local
    container_name: pindoc-server-daemon
    environment:
      PINDOC_DATABASE_URL: postgres://pindoc:pindoc_dev@db:5432/pindoc?sslmode=disable
      PINDOC_HTTP_MCP_ADDR: 0.0.0.0:5830
      PINDOC_PROJECT: ${PINDOC_PROJECT:-pindoc}
      PINDOC_AUTH_MODE: ${PINDOC_AUTH_MODE:-trusted_local}
      PINDOC_LOG_LEVEL: ${PINDOC_LOG_LEVEL:-info}
      PINDOC_USER_LANGUAGE: ${PINDOC_USER_LANGUAGE:-ko}
      PINDOC_USER_NAME: ${PINDOC_USER_NAME:-}
      PINDOC_USER_EMAIL: ${PINDOC_USER_EMAIL:-}
      PINDOC_AGENT_ID: ${PINDOC_AGENT_ID:-}
      PINDOC_PUBLIC_BASE_URL: ${PINDOC_PUBLIC_BASE_URL:-http://127.0.0.1:${PINDOC_DAEMON_PORT:-5830}}
      PINDOC_OAUTH_SIGNING_KEY_PATH: ${PINDOC_OAUTH_SIGNING_KEY_PATH:-/var/lib/pindoc/cache/oauth-signing.pem}
      PINDOC_OAUTH_CLIENT_ID: ${PINDOC_OAUTH_CLIENT_ID:-claude-desktop}
      PINDOC_OAUTH_CLIENT_SECRET: ${PINDOC_OAUTH_CLIENT_SECRET:-}
      PINDOC_OAUTH_REDIRECT_URIS: ${PINDOC_OAUTH_REDIRECT_URIS:-http://127.0.0.1:3846/callback,http://localhost:3846/callback}
      PINDOC_OAUTH_REDIRECT_BASE_URL: ${PINDOC_OAUTH_REDIRECT_BASE_URL:-}
      PINDOC_GITHUB_CLIENT_ID: ${PINDOC_GITHUB_CLIENT_ID:-}
      PINDOC_GITHUB_CLIENT_SECRET: ${PINDOC_GITHUB_CLIENT_SECRET:-}
      # Do not pass host PINDOC_EMBED_PROVIDER through here. A one-off
      # `PINDOC_EMBED_PROVIDER=stub docker compose up` previously made the
      # daemon silently index with hash embeddings. Compose users must opt
      # in through the compose-specific name below.
      PINDOC_EMBED_PROVIDER: ${PINDOC_COMPOSE_EMBED_PROVIDER:-}
      PINDOC_EMBED_GEMMA_VARIANT: ${PINDOC_EMBED_GEMMA_VARIANT:-}
      PINDOC_EMBED_ENDPOINT: ${PINDOC_COMPOSE_EMBED_ENDPOINT:-}
      PINDOC_EMBED_MODEL: ${PINDOC_COMPOSE_EMBED_MODEL:-}
      PINDOC_EMBED_DIM: ${PINDOC_COMPOSE_EMBED_DIM:-}
      PINDOC_EMBED_MAX_TOKENS: ${PINDOC_COMPOSE_EMBED_MAX_TOKENS:-}
      PINDOC_EMBED_PREFIX_QUERY: ${PINDOC_COMPOSE_EMBED_PREFIX_QUERY:-}
      PINDOC_EMBED_PREFIX_DOCUMENT: ${PINDOC_COMPOSE_EMBED_PREFIX_DOCUMENT:-}
      PINDOC_EMBED_MODEL_DIR: /var/lib/pindoc/cache/models/embeddinggemma-300m
      PINDOC_EMBED_RUNTIME_DIR: /var/lib/pindoc/cache/runtime
    ports:
      - "127.0.0.1:${PINDOC_DAEMON_PORT:-5830}:5830"
    volumes:
      - pindoc_cache:/var/lib/pindoc/cache
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5830/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # Text Embeddings Inference — HuggingFace's Rust server that exposes any
  # sentence-transformer-compatible model as an OpenAI-style /v1/embeddings
  # endpoint. CPU image works everywhere; swap to -turing / -ampere etc. for
  # GPU hosts.
  #
  # Default model: intfloat/multilingual-e5-base (768 dim, XLM-RoBERTa
  # backbone, Korean quality is solid). It needs "query: " / "passage: "
  # prefixes per the E5 convention — Pindoc's HTTPProvider handles that on
  # the client side based on embed.Request.Kind.
  #
  # To swap models:
  #   1. Change MODEL_ID below (and PINDOC_EMBED_MODEL on the host).
  #   2. If the new model has a different dimension ≤768, update
  #      PINDOC_EMBED_DIM. The DB column is vector(768) + PadTo768 truncates
  #      / zero-pads so >768 dim models lose their tail.
  #   3. Re-embed: go run ./cmd/pindoc-reembed
  embed:
    # Gated behind the `tei` profile (2026-04-23 cleanup). Bundled Gemma Q4
    # is the default embedder; this service only runs when the operator
    # explicitly opts into PINDOC_EMBED_PROVIDER=http with
    # `docker compose --profile tei up`.
    profiles: ["tei"]
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    container_name: pindoc-embed
    command:
      - --model-id=intfloat/multilingual-e5-base
      - --port=80
      # Truncate inputs that exceed the model's max_tokens (512 for e5-base)
      # instead of erroring. Our chunker caps at ~600 bytes which stays
      # under 512 tokens in English but can overflow in Korean dense text.
      # Silent truncation is fine for retrieval — the tail of a long chunk
      # is usually less semantically important than its heading-near body.
      - --auto-truncate
    environment:
      # Cache downloaded weights to the named volume so container recreates
      # don't re-download ~500MB every time.
      HF_HOME: /data
    ports:
      - "5860:80"
    volumes:
      - pindoc_embed_cache:/data
    healthcheck:
      # /health returns 200 once the model has loaded. First boot may take
      # a minute while weights download.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

volumes:
  pindoc_db:
    name: pindoc_db
  pindoc_cache:
    name: pindoc_cache
  pindoc_embed_cache:
    name: pindoc_embed_cache
