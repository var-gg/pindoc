name: CLA check

# Runs the CLA assistant on every PR. First-time contributors get a
# sign link posted as a PR comment; re-signers pass silently. PRs
# cannot merge until the check is green. See CONTRIBUTING.md and
# CLA.md for the legal text.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: CLA assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN is optional; only needed if the
          # signatures should be stored in a separate repository. We
          # keep signatures in the main repo so the default token is
          # enough.
        with:
          path-to-signatures: '.github/cla-signatures/v1.json'
          path-to-document: 'https://github.com/var-gg/pindoc/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot],renovate[bot]'
          remote-organization-name: 'var-gg'
          remote-repository-name: 'pindoc'
          custom-notsigned-prcomment: |
            Thanks for contributing to **Pindoc**! Before we can merge
            your pull request, we need you to sign the
            [Contributor License Agreement](https://github.com/var-gg/pindoc/blob/main/CLA.md).

            **You can sign the CLA by posting a pull request comment
            with the following text:**

            > I have read the CLA Document and I hereby sign the CLA

            You only need to do this once; the signature applies to
            all your future contributions to this repository.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA ✅'
